<div class="container mt-4">
  <h2>Add New Perfume</h2>

  <input [(ngModel)]="perfume.name" class="form-control mb-2" placeholder="Name" required>

  <input [(ngModel)]="perfume.brand" class="form-control mb-2" placeholder="Brand" required>

  <input [(ngModel)]="perfume.scentType" class="form-control mb-2" placeholder="Scent" required>

  <input [(ngModel)]="perfume.price" class="form-control mb-2" placeholder="Price" type="number" required>

  <textarea [(ngModel)]="perfume.description" class="form-control mb-2" placeholder="Description" required></textarea>

  <input [(ngModel)]="perfume.image" class="form-control mb-3" placeholder="Image URL"  required>

  <div class="mb-3">
    <label class="form-label d-block">Gender</label>

    <input type="radio" [(ngModel)]="perfume.gender" value="Men" name="gender" required>
    <label class="me-3">Men</label>

    <input type="radio" [(ngModel)]="perfume.gender" value="Women" name="gender" required>
    <label class="me-3">Women</label>

    <input type="radio" [(ngModel)]="perfume.gender" value="Unisex" name="gender" required>
    <label>Unisex</label>
  </div>



    <div class="mb-3">
  <label class="form-label d-block" >Rating</label>

  <div class="star-rating">
    <span
      *ngFor="let star of [1, 2, 3, 4, 5]"
      [class.checked]="star <= perfume.rating"
      (click)="setRating(star)">
      ★
    </span>
  </div>

  <p class="mt-2">Selected rating: {{ perfume.rating }}/5</p>
</div>

  <button class="btn btn-custom" (click)="addPerfume()">
  Add Perfume
</button>
</div>

<!-- Star rating idea adapted from W3Schools:
https://www.w3schools.com/howto/howto_css_user_rating.asp -->
