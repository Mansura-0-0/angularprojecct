<div> clsss ="container mt-4">
    <h2 class="mb-4">Perfume List</h2>

    <div class ="row">
        <div class="col-md-4 mb-4" *ngFor="let perfume of perfumes">
            <div class="card h-100">
                <div class="card-body">
                    <h5>{{ p.name }}</h5>
                    <p><strong>Brand:</strong> {{ p.brand }}</p>
                    <p><strong>Scent:</strong> {{ p.scent }}</p>
                    <a [routerLink]="['/details', p._id]" class="btn btn-primary">View Details</a>
                    <button (click)="deletePerfume(p._id)" class="btn btn-danger ml-2">Delete</button>
                    

                    
                </div>
            </div>
        </div>
    </div>
</div>
