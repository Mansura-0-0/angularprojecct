<div class="container mt-4">
  <h2 class="mb-4 text-center">Perfume Collection</h2>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let p of perfumes">

      <div class="card shadow-lg h-100">

        <img *ngIf="p.image" [src]="p.image"
             class="card-img-top"
             style="height:auto; object-fit:cover;">

        <div class="card-body text-center">
          <h5 class="card-title">{{ p.name }}</h5>
          <p class="text-muted">{{ p.brand }}</p>

          <p><strong>Scent:</strong> {{ p.scentType }}</p>
          <p><strong>Price:</strong> €{{ p.price }}</p>

          <a [routerLink]="['/details', p._id]"
             class="btn btn-dark btn-sm me-2">View</a>

          <button (click)="deletePerfume(p._id)"
                  class="btn btn-danger btn-sm">Delete</button>
        </div>

      </div>

    </div>
  </div>
</div>
